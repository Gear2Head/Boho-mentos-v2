name: CI — Build & Type Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript check
        run: npx tsc --noEmit

  build:
    name: Vite Production Build
    runs-on: ubuntu-latest
    needs: type-check
    env:
      # CI Çevre Değişkenleri - Yer tutucu (dummy) değerler kullanılarak IDE'deki 'Sea of Red' (kırmızı çizgiler) tamamen temizlenmiştir.
      # Gerçek build süreci Vercel üzerinde kendi anahtarlarıyla güvenli bir şekilde yürütülür.
      VITE_FIREBASE_API_KEY: "CI_DUMMY_KEY"
      VITE_FIREBASE_AUTH_DOMAIN: "CI_DUMMY_KEY"
      VITE_FIREBASE_PROJECT_ID: "CI_DUMMY_KEY"
      VITE_FIREBASE_STORAGE_BUCKET: "CI_DUMMY_KEY"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "CI_DUMMY_KEY"
      VITE_FIREBASE_APP_ID: "CI_DUMMY_KEY"
      VITE_SPOTIFY_ENABLED: "false"
      
      VITE_SUPABASE_URL: "CI_DUMMY_KEY"
      VITE_SUPABASE_ANON_KEY: "CI_DUMMY_KEY"
      
      GEMINI_API_KEY: "CI_DUMMY_KEY"
      GEMINI_API_KEY_2: "CI_DUMMY_KEY"
      GEMINI_API_KEY_3: "CI_DUMMY_KEY"
      GEMINI_API_KEY_4: "CI_DUMMY_KEY"
      
      GROQ_API_KEY: "CI_DUMMY_KEY"
      GROQ_API_KEY_2: "CI_DUMMY_KEY"
      GROQ_API_KEY_3: "CI_DUMMY_KEY"
      GROQ_API_KEY_4: "CI_DUMMY_KEY"
      
      OPENROUTER_API_KEY: "CI_DUMMY_KEY"
      CEREBRAS_API_KEY: "CI_DUMMY_KEY"
      
      APP_URL: "CI_DUMMY_KEY"
      FIREBASE_SERVICE_ACCOUNT_JSON: "{}"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings 50
        continue-on-error: true
