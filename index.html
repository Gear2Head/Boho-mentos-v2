<!doctype html>
<html lang="en">
  <head>
    <script>
      // [UX-004 FIX]: FOUC önleme — tema belirleme inline script
      // IDB okuma async olduğundan localStorage fallback kullanılır (Zustand persist key)
      (function() {
        var stored = null;
        try {
          var raw = localStorage.getItem('yks_coach_theme_fast');
          if (!raw) {
            // Zustand persist'ten parse etme (sync olmayan IDB için fallback)
            raw = localStorage.getItem('yks_coach_storage');
            if (raw) {
              var parsed = JSON.parse(raw);
              stored = parsed?.state?.theme;
            }
          } else {
            stored = raw;
          }
        } catch(e) {}
        var isDark = stored !== 'light';
        var html = document.documentElement;
        html.classList.add(isDark ? 'dark' : 'light');
        html.classList.remove(isDark ? 'light' : 'dark');
        html.style.colorScheme = isDark ? 'dark' : 'light';
        html.style.backgroundColor = isDark ? '#0A0A0A' : '#F8F8F8';
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <title>Boho Mentosluk</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
